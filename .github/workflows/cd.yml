name: CD

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  build:
    name: Build & verify artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          enable-cache: true
      - run: uv sync --locked --all-extras --dev
      - run: uv run pytest -q
      # Stands in for "the artifact is installable and importable" since
      # there is no packaged build step (no Docker image, no wheel) yet.
      - name: Smoke-test the package imports cleanly
        run: uv run python -c "import src.cli, src.agent.graph; print('import OK')"

  deploy-dev:
    name: Deploy to dev
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/deploy.sh dev backend

  deploy-stage:
    name: Deploy to stage
    needs: deploy-dev
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: stage
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/deploy.sh stage backend

  deploy-prod:
    name: Deploy to prod
    needs: deploy-stage
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - run: bash scripts/deploy.sh prod backend
